<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚄 贵州都匀至福建三明·联名市井自助行程指南</title>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-title">黔闽市井行程指南</h1>
      <p class="hero-subtitle">贵州都匀 ➔ 广州 ➔ 揭阳 ➔ 潮州 ➔ 汕头 ➔ 东山岛 ➔ 泉州 ➔ 三明</p>
      
      <div class="route-flow">
        <span class="route-node">都匀东</span>
        <i class="fa-solid fa-chevron-right route-arrow"></i>
        <span class="route-node">广州</span>
        <i class="fa-solid fa-chevron-right route-arrow"></i>
        <span class="route-node">揭阳</span>
        <i class="fa-solid fa-chevron-right route-arrow"></i>
        <span class="route-node">潮州</span>
        <i class="fa-solid fa-chevron-right route-arrow"></i>
        <span class="route-node">汕头</span>
        <i class="fa-solid fa-chevron-right route-arrow"></i>
        <span class="route-node">东山岛</span>
        <i class="fa-solid fa-chevron-right route-arrow"></i>
        <span class="route-node">泉州</span>
        <i class="fa-solid fa-chevron-right route-arrow"></i>
        <span class="route-node">三明</span>
      </div>
    </div>
  </section>

  <!-- Main Content -->
  <main class="main-container">
    
    <!-- Tabs -->
    <div class="tabs-container">
      <button class="tab-btn active" data-tab="eat">
        <i class="fa-solid fa-bowl-food"></i><span class="tab-text">吃 · 市井老字号</span>
      </button>
      <button class="tab-btn" data-tab="play">
        <i class="fa-solid fa-map-location-dot"></i><span class="tab-text">玩 · 景点避坑</span>
      </button>
      <button class="tab-btn" data-tab="stay">
        <i class="fa-solid fa-hotel"></i><span class="tab-text">住 · 选区指引</span>
      </button>
      <button class="tab-btn" data-tab="travel">
        <i class="fa-solid fa-train-subway"></i><span class="tab-text">行 · 交通规划器</span>
      </button>
    </div>

    <!-- Controls Container -->
    <div class="controls-container" id="controls-container">
      <div class="filters-container" id="city-filters">
        <!-- Generated by JS -->
      </div>
      <div class="search-container" id="search-container">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="search-input" class="search-input" placeholder="搜索店名、地点或特色...">
      </div>
    </div>

    <!-- Tab Contents -->
    
    <!-- Eat Tab -->
    <div class="tab-content" id="tab-eat">
      <div class="cards-grid" id="eat-grid">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Play Tab -->
    <div class="tab-content d-none" id="tab-play">
      <div class="cards-grid" id="play-grid">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Stay Tab -->
    <div class="tab-content d-none" id="tab-stay">
      <div class="stay-section" id="stay-list">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Travel Tab (Interactive D1 / LocalStorage Planner) -->
    <div class="tab-content d-none" id="tab-travel">
      <div class="transport-panel">
        
        <!-- Form -->
        <div class="form-card">
          <h3 class="form-title"><i class="fa-solid fa-plus-circle"></i> 添加自定义车次</h3>
          <form id="transport-form">
            <div class="form-group">
              <label class="form-label">出发城市/车站</label>
              <input type="text" id="from-st" class="form-input" placeholder="例如：都匀东" required>
            </div>
            <div class="form-group">
              <label class="form-label">到达城市/车站</label>
              <input type="text" id="to-st" class="form-input" placeholder="例如：广州南" required>
            </div>
            <div class="form-group">
              <label class="form-label">出发日期</label>
              <input type="date" id="dep-date" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label">出发时间</label>
              <input type="time" id="dep-time" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label">车次号 (选填)</label>
              <input type="text" id="train-no" class="form-input" placeholder="例如：G3701">
            </div>
            <div class="form-group">
              <label class="form-label">票价 (元, 选填)</label>
              <input type="number" id="price" class="form-input" placeholder="318">
            </div>
            <div class="form-group">
              <label class="form-label">备注 (选填)</label>
              <input type="text" id="note" class="form-input" placeholder="提示说明">
            </div>
            <button type="submit" class="btn"><i class="fa-solid fa-paper-plane"></i> 添加行程</button>
          </form>
        </div>

        <!-- Timeline -->
        <div>
          <div class="timeline" id="timeline-list">
            <!-- Rendered by JS -->
          </div>
          <div id="timeline-loading" style="text-align: center; padding: 20px; color: var(--text-secondary); display: none;">
            <i class="fa-solid fa-spinner fa-spin"></i> 正在同步云端行程数据...
          </div>
          
          <div class="summary-bar">
            <div>
              <span style="color: var(--text-secondary)">交通总花费：</span>
              <span class="price-tag" id="total-price">¥0</span>
            </div>
            <div style="display: flex; gap: 10px;">
              <button class="btn btn-secondary" style="width: auto;" id="btn-share">
                <i class="fa-solid fa-copy"></i> 复制行程文本
              </button>
              <button class="btn btn-secondary" style="width: auto; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: var(--accent);" id="btn-clear-db">
                <i class="fa-solid fa-trash-can"></i> 重置默认
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </main>

  <!-- Toast -->
  <div class="toast" id="toast">复制成功，可直接分享！</div>

  <!-- Foot -->
  <footer style="text-align: center; padding: 40px; border-top: 1px solid var(--panel-border); margin-top: 80px; color: var(--text-secondary); font-size: 0.9rem;">
    <p>© 2026 黔闽市井行程指南 · 全线明码标价市井路线</p>
    <p style="margin-top: 10px; font-size: 0.8rem; opacity: 0.6;">Cloudflare Pages & D1 Real-time Powered</p>
  </footer>

    // Load segment planner list (Try D1 API, fallback to LocalStorage)
    async function loadSegments() {
      const loader = document.getElementById('timeline-loading');
      if (loader) loader.style.display = 'block';
      timelineList.innerHTML = '';
      try {
        const res = await fetch('/api/segments');
        if (!res.ok) throw new Error('API fetch failed');
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error('Data is not an array');
        segments = data;
        
        // If empty DB, prepopulate D1 (in browser D1 might be empty initially)
        if (segments.length === 0) {
          await prepopulateRemoteDb();
        }
      } catch (e) {
        console.warn('D1 Database offline or API error, falling back to LocalStorage.', e.message);
        const local = localStorage.getItem('gdx_segments');
        if (local) {
          segments = JSON.parse(local);
        } else {
          segments = [...DEFAULT_SEGMENTS];
          localStorage.setItem('gdx_segments', JSON.stringify(segments));
        }
      } finally {
        if (loader) loader.style.display = 'none';
      }
      renderTimeline();
    }

    // Prepopulate remote D1 database with default segments
    async function prepopulateRemoteDb() {
      for (const seg of DEFAULT_SEGMENTS) {
        await fetch('/api/segments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(seg)
        });
      }
      // Reload from D1
      const res = await fetch('/api/segments');
      if (!res.ok) throw new Error('Failed to reload segments after prepopulating');
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error('Reloaded data is not an array');
      segments = data;
    }

      let totalCost = 0;
      
      segments.forEach((seg, index) => {
        const item = document.createElement('div');
        item.className = 'timeline-item';
        totalCost += parseFloat(seg.price || 0);

        // Train schedule query link
        const scheduleSearchUrl = seg.train_no 
          ? `https://www.baidu.com/s?wd=${encodeURIComponent(seg.train_no + '时刻表')}` 
          : 'https://kyfw.12306.cn/otn/leftTicket/init';

        item.innerHTML = `
          <div class="timeline-dot"></div>
          <div class="timeline-card">
            <div class="timeline-main">
              <div class="train-badge">${seg.train_no || '火车'}</div>
              <div>
                <div class="station-flow">
                  <span>${seg.from_st}</span>
                  <i class="fa-solid fa-right-long" style="color: var(--primary); font-size: 0.8rem;"></i>
                  <span>${seg.to_st}</span>
                </div>
                <div class="station-time">
                  <i class="fa-solid fa-calendar-days"></i> ${seg.date || '未设日期'}
                  <i class="fa-solid fa-clock" style="margin-left: 10px;"></i> ${seg.dep_time || '--:--'}
                  ${seg.note ? ` | <span style="color: var(--primary);">${seg.note}</span>` : ''}
                </div>
              </div>
            </div>
            <div class="timeline-meta">
              <span class="price-tag">${seg.price ? `¥${seg.price}` : '免费'}</span>
              <a href="${scheduleSearchUrl}" target="_blank" class="btn btn-secondary" style="width: auto; padding: 6px 12px; font-size: 0.8rem;">
                <i class="fa-solid fa-calendar-days"></i> 时刻表
              </a>
              <button class="btn-icon" onclick="startEditSegment(${seg.id || index}, ${seg.id ? 'true' : 'false'})" style="color: var(--primary);">
                <i class="fa-solid fa-pencil"></i>
              </button>
              <button class="btn-icon" onclick="deleteSegment(${seg.id || index}, ${seg.id ? 'true' : 'false'})">
                <i class="fa-solid fa-trash-can"></i>
              </button>
            </div>
          </div>
        `;
        timelineList.appendChild(item);
      });

      totalPriceEl.innerText = `¥${totalCost}`;
    }

    // Submit segment handler
    async function handleAddSegment(e) {
      e.preventDefault();
      const from_st = document.getElementById('from-st').value.trim();
      const to_st = document.getElementById('to-st').value.trim();
      const date = document.getElementById('dep-date').value;
      const dep_time = document.getElementById('dep-time').value;
      const train_no = document.getElementById('train-no').value.trim().toUpperCase();
      const price = parseFloat(document.getElementById('price').value) || 0;
      const note = document.getElementById('note').value.trim();

      const newSegment = {
        from_st,
        to_st,
        date,
        dep_time,
        train_no,
        price,
        note
      };

      if (editingId !== null || editingIndex !== null) {
        // Edit mode
        if (editingId !== null) {
          newSegment.id = editingId;
          try {
            const res = await fetch('/api/segments', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(newSegment)
            });
            if (!res.ok) throw new Error('API update failed');
          } catch (err) {
            console.error(err);
          }
        } else {
          // Local edit
          newSegment.sort_order = segments[editingIndex].sort_order;
          segments[editingIndex] = newSegment;
          localStorage.setItem('gdx_segments', JSON.stringify(segments));
        }
        cancelEdit();
      } else {
        // Add mode
        newSegment.sort_order = segments.length + 1;
        try {
          // Try D1 API POST
          const res = await fetch('/api/segments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newSegment)
          });
          if (!res.ok) throw new Error('API post failed');
        } catch (err) {
          console.warn('API post failed, saving to LocalStorage instead.');
          segments.push(newSegment);
          localStorage.setItem('gdx_segments', JSON.stringify(segments));
        }
      }

      transportForm.reset();
      await loadSegments();
    }

    // Delete segment
    async function deleteSegment(idOrIndex, isRemote) {
      if (isRemote) {
        try {
          const res = await fetch(`/api/segments?id=${idOrIndex}`, { method: 'DELETE' });
          if (!res.ok) throw new Error('API delete failed');
        } catch (e) {
          console.error(e);
        }
      } else {
        segments.splice(idOrIndex, 1);
        localStorage.setItem('gdx_segments', JSON.stringify(segments));
      }
      await loadSegments();
    }

    // Start editing segment
    function startEditSegment(idOrIndex, isRemote) {
      let seg;
      if (isRemote) {
        seg = segments.find(s => s.id === idOrIndex);
        editingId = idOrIndex;
        editingIndex = null;
      } else {
        seg = segments[idOrIndex];
        editingIndex = idOrIndex;
        editingId = null;
      }
      
      if (!seg) return;
      
      // Populate form
      document.getElementById('from-st').value = seg.from_st;
      document.getElementById('to-st').value = seg.to_st;
      document.getElementById('dep-date').value = seg.date || '';
      document.getElementById('dep-time').value = seg.dep_time || '';
      document.getElementById('train-no').value = seg.train_no || '';
      document.getElementById('price').value = seg.price || '';
      document.getElementById('note').value = seg.note || '';
      
      // Change form display
      const formCard = document.querySelector('.form-card');
      formCard.querySelector('.form-title').innerHTML = `<i class="fa-solid fa-pencil"></i> 编辑车次`;
      const submitBtn = formCard.querySelector('button[type="submit"]');
      submitBtn.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> 保存修改`;
      
      // Add a cancel button if not already present
      if (!document.getElementById('btn-cancel-edit')) {
        const cancelBtn = document.createElement('button');
        cancelBtn.type = 'button';
        cancelBtn.id = 'btn-cancel-edit';
        cancelBtn.className = 'btn btn-secondary';
        cancelBtn.style.marginTop = '10px';
        cancelBtn.innerHTML = `<i class="fa-solid fa-xmark"></i> 取消编辑`;
        cancelBtn.addEventListener('click', cancelEdit);
        formCard.querySelector('form').appendChild(cancelBtn);
      }
      
      // Scroll to form on mobile
      formCard.scrollIntoView({ behavior: 'smooth' });
    }

    // Cancel editing
    function cancelEdit() {
      editingId = null;
      editingIndex = null;
      
      const formCard = document.querySelector('.form-card');
      formCard.querySelector('.form-title').innerHTML = `<i class="fa-solid fa-plus-circle"></i> 添加自定义车次`;
      const submitBtn = formCard.querySelector('button[type="submit"]');
      submitBtn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> 添加行程`;
      
      const cancelBtn = document.getElementById('btn-cancel-edit');
      if (cancelBtn) cancelBtn.remove();
      
      document.getElementById('transport-form').reset();
    }

    // Reset default DB content
    async function resetDefaultSegments() {
      if (!confirm('确定要重置回默认的都匀-广州-潮汕行程吗？你的自定义添加将会被清空。')) return;
      
      try {
        // Clear remote
        for (const seg of segments) {
          if (seg.id) {
            await fetch(`/api/segments?id=${seg.id}`, { method: 'DELETE' });
          }
        }
        localStorage.removeItem('gdx_segments');
      } catch (e) {
        localStorage.removeItem('gdx_segments');
      }
      await loadSegments();
    }

    // Copy itinerary text helper
    function copyItineraryText() {
      let text = "🚄 联名自助行程交通规划概要：\n\n";
      segments.forEach(seg => {
        text += `${seg.date || '无日期'}  ${seg.from_st.padEnd(6, ' ')} -  ${seg.to_st.padEnd(6, ' ')}  ${seg.dep_time}  ${(seg.train_no || '火车').padEnd(7, ' ')}  ${seg.price}元`;
        if (seg.note) text += ` (${seg.note})`;
        text += "\n";
      });
      
      // Copy to clipboard
      navigator.clipboard.writeText(text).then(() => {
        toast.classList.add('show');
        setTimeout(() => {
          toast.classList.remove('show');
        }, 2500);
      });
    }
  </script>
</body>
