<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="site-title">🚄 漫途 · 私人行程手账</title>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @media (max-width: 600px) {
      #top-auth-overlay {
        top: 10px !important;
        right: 10px !important;
        transform: scale(0.8);
        transform-origin: top right;
      }
      .hero {
        padding-top: 30px;
      }
    }
  </style>
</head>
<body>

  <!-- Top Right Auth Overlay -->
  <div id="top-auth-overlay" style="position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; align-items: center; white-space: nowrap;">
    <div id="auth-user-info" style="display: none; align-items: center; gap: 8px; font-size: 0.95rem; background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); padding: 6px 16px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); white-space: nowrap;">
      <i class="fa-solid fa-circle-user" style="color: var(--primary);"></i>
      <span id="auth-username" style="font-weight: 600; color: var(--text-primary); white-space: nowrap;"></span>
      <button class="btn btn-secondary" onclick="logout()" style="padding: 4px 8px; font-size: 0.85rem; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; white-space: nowrap;"><i class="fa-solid fa-arrow-right-from-bracket"></i> 退出</button>
    </div>
    <div id="auth-login-btn" style="display: flex;">
      <button class="btn" onclick="showAuthModal()" style="padding: 8px 20px; font-size: 0.95rem; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); white-space: nowrap;"><i class="fa-solid fa-right-to-bracket"></i> 登录 / 注册</button>
    </div>
  </div>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-title" id="hero-title">漫途 · 私人行程手账</h1>
      <p class="hero-subtitle" id="hero-subtitle"></p>
      
      <div class="route-flow" id="route-flow">
        <!-- Rendered by JS -->
      </div>
    </div>
  </section>

  <!-- Main Content -->
  <main class="main-container">
    
    <!-- Trip Switcher Bar -->
    <div class="trip-switcher-bar" style="margin-bottom: 20px; display: flex; justify-content: flex-end; align-items: center; gap: 8px;">
      <span style="font-size: 0.85rem; color: var(--text-secondary);"><i class="fa-solid fa-route"></i> 当前行程：</span>
      <select id="trip-selector" onchange="switchTrip(this.value)" style="padding: 6px 12px; border-radius: 6px; border: 1px solid var(--panel-border); background: var(--panel-bg); color: var(--text-primary); font-size: 0.9rem; cursor: pointer; outline: none; font-weight: 500;">
        <!-- Rendered by JS -->
      </select>
      <button class="btn btn-secondary" onclick="openTripManagerModal()" title="管理行程" style="width: 36px; height: 36px; padding: 0; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; border-radius: 6px; border: 1px solid var(--panel-border); background: var(--panel-bg); color: var(--text-primary); cursor: pointer;">
        <i class="fa-solid fa-gear"></i>
      </button>
    </div>

    <!-- Tabs -->
    <div class="tabs-container">
      <button class="tab-btn active" data-tab="eat">
        <i class="fa-solid fa-bowl-food"></i><span class="tab-text">吃 · 市井老字号</span>
      </button>
      <button class="tab-btn" data-tab="play">
        <i class="fa-solid fa-map-location-dot"></i><span class="tab-text">玩 · 景点避坑</span>
      </button>
      <button class="tab-btn" data-tab="stay">
        <i class="fa-solid fa-hotel"></i><span class="tab-text">住 · 选区指引</span>
      </button>
      <button class="tab-btn" data-tab="travel">
        <i class="fa-solid fa-train-subway"></i><span class="tab-text">行 · 交通规划器</span>
      </button>
    </div>

    <!-- Controls Container -->
    <div class="controls-container" id="controls-container">
      <div class="filters-container" id="city-filters">
        <!-- Generated by JS -->
      </div>
      <div class="search-container" id="search-container">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="search-input" class="search-input" placeholder="搜索店名、地点或特色...">
      </div>
    </div>

    <!-- Tab Contents -->
    
    <!-- Eat Tab -->
    <div class="tab-content" id="tab-eat">
      <div style="display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px;">
        <button class="btn btn-secondary" style="width: auto; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: var(--accent);" onclick="clearAllGuides('eat')">
          <i class="fa-solid fa-trash-can"></i> 清空美食
        </button>
        <button class="btn" style="width: auto; background: var(--primary); padding: 8px 16px; font-size: 0.9rem;" onclick="openGuideItemModal('eat')">
          <i class="fa-solid fa-plus-circle"></i> 添加美食推荐
        </button>
      </div>
      <div class="cards-grid" id="eat-grid">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Play Tab -->
    <div class="tab-content d-none" id="tab-play">
      <div style="display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px;">
        <button class="btn btn-secondary" style="width: auto; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: var(--accent);" onclick="clearAllGuides('play')">
          <i class="fa-solid fa-trash-can"></i> 清空景点
        </button>
        <button class="btn" style="width: auto; background: var(--primary); padding: 8px 16px; font-size: 0.9rem;" onclick="openGuideItemModal('play')">
          <i class="fa-solid fa-plus-circle"></i> 添加景点推荐
        </button>
      </div>
      <div class="cards-grid" id="play-grid">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Stay Tab -->
    <div class="tab-content d-none" id="tab-stay">

      <!-- Global Hotel Timeline -->
      <div id="global-hotel-panel" class="transport-panel d-none" style="margin-bottom: 30px;">
        <h3 class="form-title" style="margin-bottom: 15px; color: var(--primary);"><i class="fa-solid fa-bed"></i> 我的住宿行程</h3>
        <div class="timeline" id="global-hotel-list" style="margin-top: 15px;">
          <!-- Rendered by JS -->
        </div>
      </div>

      <div class="stay-section" id="stay-list">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Travel Tab (Interactive D1 / LocalStorage Planner) -->
    <div class="tab-content d-none" id="tab-travel">
      
      <!-- Mobile Add Segment Button -->
      <div class="mobile-add-btn-container" style="display: none; justify-content: flex-end; margin-bottom: 15px;">
        <button class="btn" style="width: auto; background: var(--primary); padding: 8px 16px; font-size: 0.9rem;" onclick="openAddTransportModal()">
          <i class="fa-solid fa-plus-circle"></i> 添加行程
        </button>
      </div>

      <div class="transport-panel">
        
        <!-- Form Wrapper -->
        <div id="transport-form-wrapper">
          <div class="form-card" style="width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto;">
            <h3 class="form-title"><i class="fa-solid fa-plus-circle"></i> 添加自定义车次</h3>
            <form id="transport-form">
              <div class="form-group">
                <label class="form-label">出发城市/车站</label>
                <input type="text" id="from-st" class="form-input" placeholder="例如：都匀东" required>
              </div>
              <div class="form-group">
                <label class="form-label">到达城市/车站</label>
                <input type="text" id="to-st" class="form-input" placeholder="例如：广州南" required>
              </div>
              <div class="form-group">
                <label class="form-label">出发日期</label>
                <input type="date" id="dep-date" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label">出发时间</label>
                <input type="time" id="dep-time" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label">车次号 (选填)</label>
                <input type="text" id="train-no" class="form-input" placeholder="例如：G3701">
              </div>
              <div class="form-group">
                <label class="form-label">票价 (元, 选填)</label>
                <input type="number" id="price" class="form-input" placeholder="318">
              </div>
              <div class="form-group">
                <label class="form-label">备注 (选填)</label>
                <input type="text" id="note" class="form-input" placeholder="提示说明">
              </div>
              <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn"><i class="fa-solid fa-paper-plane"></i> 添加行程</button>
                <button type="button" class="btn btn-secondary mobile-cancel-btn" onclick="closeAddTransportModal()" style="display: none;"><i class="fa-solid fa-xmark"></i> 取消</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Timeline -->
        <div>
          <div class="timeline" id="timeline-list">
            <!-- Rendered by JS -->
          </div>
          <div id="timeline-loading" style="text-align: center; padding: 20px; color: var(--text-secondary); display: none;">
            <i class="fa-solid fa-spinner fa-spin"></i> 正在同步云端行程数据...
          </div>
          
          <div class="summary-bar">
            <div>
              <span style="color: var(--text-secondary)">交通总花费：</span>
              <span class="price-tag" id="total-price">¥0</span>
            </div>
            <div style="display: flex; gap: 10px;">
              <button class="btn btn-secondary" style="width: auto;" id="btn-share">
                <i class="fa-solid fa-copy"></i> 复制行程文本
              </button>
              <button class="btn btn-secondary" style="width: auto; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: var(--accent);" id="btn-clear-db">
                <i class="fa-solid fa-trash-can"></i> 重置默认
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </main>

  <!-- Toast -->
  <div class="toast" id="toast">复制成功，可直接分享！</div>

  
  <!-- Auth Modal -->
  <div id="auth-modal" class="d-none" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:9999; display:flex; justify-content:center; align-items:center;">
    <div class="form-card" style="width: 90%; max-width: 400px; padding: 30px 20px;">
      <h3 class="form-title" style="text-align: center; margin-bottom: 25px; font-size: 1.3rem;"><i class="fa-solid fa-passport" style="color: var(--primary);"></i> 通行凭证</h3>
      
      <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
        <button id="tab-login" class="tab-btn active" style="flex:1" onclick="switchAuthTab('login')">登 录</button>
        <button id="tab-register" class="tab-btn" style="flex:1" onclick="switchAuthTab('register')">注 册</button>
      </div>

      <form id="auth-form" onsubmit="handleAuthSubmit(event)">
        <input type="hidden" id="auth-action" value="login">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" id="auth-username-input" class="form-input" required placeholder="输入账号名">
        </div>
        <div class="form-group">
          <label class="form-label">密 码</label>
          <input type="password" id="auth-password-input" class="form-input" required placeholder="输入密码">
        </div>
        <div class="form-group" id="auth-display-name-group" style="display: none;">
          <label class="form-label">昵 称 (选填)</label>
          <input type="text" id="auth-display-name-input" class="form-input" placeholder="输入显示昵称">
        </div>
        
        <div style="display:flex; flex-direction: column; gap:10px; margin-top:30px;">
          <button type="submit" class="btn" style="width: 100%; padding: 10px;" id="auth-submit-btn">登录并同步数据</button>
          <button type="button" class="btn btn-secondary" style="width: 100%; padding: 10px; background: transparent; border: none;" onclick="closeAuthModal()">暂不登录 (仅查看本地缓存)</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add/Edit Guide Item Modal -->
  <div id="guide-item-modal" class="d-none" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:1000; display:flex; justify-content:center; align-items:center;">
    <div class="form-card" style="width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto;">
      <h3 class="form-title" id="guide-modal-title"><i class="fa-solid fa-plus-circle"></i> 添加记录</h3>
      <form id="guide-item-form" onsubmit="handleSaveGuideItem(event)">
        <input type="hidden" id="guide-id">
        <input type="hidden" id="guide-category">
        
        <div class="form-group">
          <label class="form-label">城市</label>
          <select id="guide-city" class="form-input" required>
            <!-- Rendered dynamically by JS -->
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label">名称</label>
          <input type="text" id="guide-name" class="form-input" required placeholder="例如：西新老牌肠粉">
        </div>
        
        <!-- Only for EAT -->
        <div class="form-group" id="group-guide-type">
          <label class="form-label">分类标签 (仅美食)</label>
          <input type="text" id="guide-type" class="form-input" placeholder="例如：肠粉、牛肉/火锅">
        </div>
        
        <div class="form-group">
          <label class="form-label">详细地址</label>
          <input type="text" id="guide-address" class="form-input" required placeholder="例如：湘桥区 西新路中段">
        </div>
        
        <div class="form-group">
          <label class="form-label">推荐描述</label>
          <textarea id="guide-desc" class="form-input" style="height: 100px;" required placeholder="写写口味特色、招牌菜推荐等..."></textarea>
        </div>
        
        <div class="form-group">
          <label class="form-label">自定义图片链接 <span style="opacity:0.6;font-weight:400;font-size:0.8rem;">（可选，留空则使用默认逻辑）</span></label>
          <input type="url" id="guide-image" class="form-input" placeholder="例如：https://example.com/pic.jpg">
        </div>
        
        <!-- Only for PLAY -->
        <div class="form-group" id="group-guide-avoid">
          <label class="form-label">避坑指南 (仅景点)</label>
          <textarea id="guide-avoid" class="form-input" style="height: 80px;" placeholder="例如：避开高峰期、注意防晒等..."></textarea>
        </div>
        
        <!-- Only for EAT -->
        <div class="form-group" id="group-guide-special" style="display: flex; align-items: center; gap: 8px;">
          <input type="checkbox" id="guide-is-special" style="width: 16px; height: 16px; accent-color: var(--primary);">
          <label class="form-label" style="margin-bottom: 0; cursor: pointer;" for="guide-is-special">加入“特色生腌”专题</label>
        </div>
        
        <div style="display:flex; gap:10px; margin-top:20px;">
          <button type="submit" class="btn"><i class="fa-solid fa-floppy-disk"></i> 确认保存</button>
          <button type="button" class="btn btn-secondary" onclick="closeGuideItemModal()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Hotel Modal -->
  <div id="add-hotel-modal" class="d-none" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:1000; display:flex; justify-content:center; align-items:center;">
    <div class="form-card" style="width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto;">
      <h3 class="form-title" style="margin-bottom: 15px;"><i class="fa-solid fa-plus-circle"></i> 添加已预订住宿</h3>
      <form id="hotel-form" onsubmit="handleAddHotel(event)">
        <input type="hidden" id="hotel-city">
        <div class="form-group">
          <label class="form-label">酒店名称</label>
          <input type="text" id="hotel-name" class="form-input" required>
        </div>
        <div style="display: flex; gap: 10px;">
          <div class="form-group" style="flex:1;">
            <label class="form-label">入住日期</label>
            <input type="date" id="hotel-checkin" class="form-input" required>
          </div>
          <div class="form-group" style="flex:1;">
            <label class="form-label">离店日期</label>
            <input type="date" id="hotel-checkout" class="form-input" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">地址</label>
          <input type="text" id="hotel-address" class="form-input" placeholder="输入详细地址，点击可跳高德导航" required>
        </div>
        <div class="form-group">
          <label class="form-label">总价格 (元)</label>
          <input type="number" id="hotel-price" class="form-input" required>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
          <button type="submit" class="btn"><i class="fa-solid fa-plus-circle"></i> 添加记录</button>
          <button type="button" class="btn btn-secondary" onclick="closeAddHotelModal()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Trip Manager Modal -->
  <div id="trip-manager-modal" class="d-none" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:1000; display:flex; justify-content:center; align-items:center;">
    <div class="form-card" style="width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;">
      <h3 class="form-title" style="margin-bottom: 15px;"><i class="fa-solid fa-route"></i> 行程管理器</h3>
      
      <!-- Action Panel -->
      <div id="trip-manager-actions" style="display: flex; flex-direction: column; gap: 12px;">
        <div style="padding: 8px 12px; border-radius: 6px; background: var(--bg-secondary, rgba(0,0,0,0.05)); font-size: 0.85rem; color: var(--text-secondary); display: flex; align-items: center; gap: 8px;">
          <i class="fa-solid fa-circle-dot" style="color: var(--primary);"></i>
          当前行程：<strong id="trip-manager-current-name" style="color: var(--text-primary);"></strong>
        </div>
        <button class="btn" onclick="showTripForm('add')" style="background: var(--primary); width: 100%;">
          <i class="fa-solid fa-plus-circle"></i> 新建行程单
        </button>
        <button class="btn btn-secondary" onclick="showTripForm('edit')" style="width: 100%;">
          <i class="fa-solid fa-pencil"></i> 编辑当前行程配置
        </button>
        <button class="btn btn-secondary" onclick="handleDeleteTrip()" style="width: 100%; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: var(--accent);">
          <i class="fa-solid fa-trash-can"></i> 删除当前行程（级联清空数据）
        </button>
        <button class="btn btn-secondary" onclick="closeTripManagerModal()" style="width: 100%; margin-top: 10px;">
          取消
        </button>
      </div>

      <!-- Add/Edit Form -->
      <form id="trip-manager-form" class="d-none" onsubmit="saveTripConfig(event)">
        <input type="hidden" id="trip-form-action" value="add">
        <div class="form-group">
          <label class="form-label">行程英文缩写 ID <span style="opacity:0.6;font-weight:400;font-size:0.8rem;">（仅小写字母，如 gansu）</span></label>
          <input type="text" id="trip-id-input" class="form-input" placeholder="gansu" required pattern="[a-z]+" oninput="this.value=this.value.toLowerCase().replace(/[^a-z]/g,'')">
        </div>
        <div class="form-group">
          <label class="form-label">行程标题</label>
          <input type="text" id="trip-title-input" class="form-input" placeholder="例如：甘南市井旅行指南" required>
        </div>
        <div class="form-group">
          <label class="form-label">副标题 <span style="opacity:0.6;font-weight:400;font-size:0.8rem;">（添加城市后自动生成，可手动修改）</span></label>
          <input type="text" id="trip-subtitle-input" class="form-input" placeholder="将根据城市列表自动生成" required>
        </div>
        <div class="form-group">
          <label class="form-label">背景大图</label>
          <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 240px; overflow-y: auto; border: 1px solid var(--panel-border); padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.02);" id="banner-grid-selector">
            <!-- Rendered by JS -->
          </div>
          <input type="hidden" id="trip-banner-input" value="images/hero_banner.webp">
          
          <!-- Real-time Preview Container -->
          <div id="banner-preview-box" style="margin-top: 10px; border-radius: 8px; height: 100px; background-size: cover; background-position: center; border: 1px solid var(--panel-border); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;">
            <div style="position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.35);"></div>
            <span style="color: white; z-index: 1; font-size: 0.9rem; font-weight: 500; text-shadow: 0 1px 3px rgba(0,0,0,0.8);">背景大图实时预览</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">路线城市</label>
          <div id="city-list-builder" style="display:flex; flex-direction:column; gap:8px; margin-bottom:8px;"></div>
          <button type="button" onclick="addCityRow()" style="width:100%; padding:8px; border:1px dashed var(--panel-border); border-radius:6px; background:transparent; color:var(--text-secondary); cursor:pointer; font-size:0.9rem;">
            <i class="fa-solid fa-plus"></i> 添加城市
          </button>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
          <button type="submit" class="btn"><i class="fa-solid fa-floppy-disk"></i> 确认保存</button>
          <button type="button" class="btn btn-secondary" onclick="showTripActions()">返回</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Map Selector Action Sheet Modal -->

    // Get active trip configuration dynamically
    function getActiveTripConfig() {
      if (!TRIP_LIST || TRIP_LIST.length === 0) {
        return {
          id: 'empty',
          title: '漫途 · 私人旅行手账',
          subtitle: '暂无行程 · 记录足迹，开启您的下一段美好旅程。',
          bannerImage: 'images/hero_banner.webp',
          route: []
        };
      }
      const storedId = localStorage.getItem('gdx_current_trip_id') || DEFAULT_TRIP_ID;
      const config = TRIP_LIST.find(t => t.id === storedId);
      return config || TRIP_LIST[0];
    }

    // Helper functions mapping to active trip config
    function getStayData() {
      const config = getActiveTripConfig();
      return config.route
        .filter(r => !r.isTransitOnly && r.stayArea)
        .map(r => ({
          city: r.name,
          area: r.stayArea,
          reason: r.stayReason,
          link: r.stayLink
        }));
    }

    function getCityImage(cityName) {
      const config = getActiveTripConfig();
      const r = config.route.find(x => x.name === cityName);
      return (r && r.image) || 'images/hero_banner.webp';
    }

    // Admin authorization session prompt
    
    // Auth & JWT Logic
    function getToken() {
      return localStorage.getItem('gdx_auth_token') || '';
    }

    function setToken(token) {
      if (token) {
        localStorage.setItem('gdx_auth_token', token);
      } else {
        localStorage.removeItem('gdx_auth_token');
      }
    }

    function showAuthModal() {
      document.getElementById('auth-modal').classList.remove('d-none');
    }

    function closeAuthModal() {
      document.getElementById('auth-modal').classList.add('d-none');
    }

    function switchAuthTab(action) {
      document.getElementById('auth-action').value = action;
      if (action === 'login') {
        document.getElementById('tab-login').classList.add('active');
        document.getElementById('tab-register').classList.remove('active');
        document.getElementById('auth-display-name-group').style.display = 'none';
        document.getElementById('auth-submit-btn').innerText = '登录并同步数据';
      } else {
        document.getElementById('tab-register').classList.add('active');
        document.getElementById('tab-login').classList.remove('active');
        document.getElementById('auth-display-name-group').style.display = 'block';
        document.getElementById('auth-submit-btn').innerText = '注册新账号';
      }
    }

    function logout() {
      setToken('');
      localStorage.removeItem('gdx_current_trip_id'); // clear current trip
      location.reload();
    }

    async function handleAuthSubmit(e) {
      e.preventDefault();
      const action = document.getElementById('auth-action').value;
      const username = document.getElementById('auth-username-input').value;
      const password = document.getElementById('auth-password-input').value;
      const displayName = document.getElementById('auth-display-name-input').value;

      try {
        // Normal fetch for auth itself
        const res = await fetch(`/api/auth?action=${action}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, display_name: displayName })
        });
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || '认证失败');
        }

        if (action === 'register') {
          showToast('注册成功，请登录');
          switchAuthTab('login');
        } else {
          showToast('登录成功');
          setToken(data.token);
          closeAuthModal();
          location.reload(); // Reload to fetch data with token
        }
      } catch (err) {
        alert(err.message);
      }
    }

    // Wrapped fetch that automatically attaches JWT
    async function apiFetch(url, options = {}) {
      const token = getToken();
      if (!options.headers) options.headers = {};
      if (token) {
        options.headers['Authorization'] = `Bearer ${token}`;
      }
      
      const res = await fetch(url, options);
      if (res.status === 401) {
        setToken('');
        showAuthModal();
        throw new Error('认证失效，请重新登录');
      }
      if (res.status === 403) {
        throw new Error('无权访问此数据');
      }
      return res;
    }

    // Check auth status on startup
    async function checkAuthStatus() {
      const token = getToken();
      if (!token) {
        showAuthModal();
        return false;
      }
      try {
        const res = await fetch('/api/auth?action=me', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          const data = await res.json();
          document.getElementById('auth-login-btn').style.display = 'none';
          document.getElementById('auth-user-info').style.display = 'flex';
          document.getElementById('auth-username').innerText = data.user.displayName || data.user.username;
          return true;
        } else {
          setToken('');
          showAuthModal();
          return false;
        }
      } catch (e) {
        // network error, allow local offline mode
        return true;
      }
    }

      if (toastEl) {

        setTimeout(() => {

    let EAT_DATA = JSON.parse(JSON.stringify(DEFAULT_EAT_DATA));
    let PLAY_DATA = JSON.parse(JSON.stringify(DEFAULT_PLAY_DATA));

    async function loadGuides() {
      const config = getActiveTripConfig();
      try {
        const res = await apiFetch(`/api/guides?trip_id=${config.id}`);
        if (!res.ok) throw new Error('API fetch failed');
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error('Data is not an array');
        
        EAT_DATA = data.filter(item => item.category === 'eat');
        PLAY_DATA = data.filter(item => item.category === 'play');
      } catch (e) {
        console.warn('D1 Database offline or API error, falling back to LocalStorage.', e.message);
        const localEat = localStorage.getItem(`gdx_eat_data_${config.id}`);
        const localPlay = localStorage.getItem(`gdx_play_data_${config.id}`);
        if (localEat) EAT_DATA = JSON.parse(localEat);
        else EAT_DATA = DEFAULT_EAT_DATA.filter(x => config.route.some(r => r.name === x.city));
        
        if (localPlay) PLAY_DATA = JSON.parse(localPlay);
        else PLAY_DATA = DEFAULT_PLAY_DATA.filter(x => config.route.some(r => r.name === x.city));
      }
      
      // Ensure all loaded guides have an ID for editing/deleting
      EAT_DATA.forEach((h, idx) => { if (!h.id) h.id = 1000 + idx; });
      PLAY_DATA.forEach((h, idx) => { if (!h.id) h.id = 2000 + idx; });

      renderEatTab();
      renderPlayTab();
    }

    async function handleSaveGuideItem(e) {
      e.preventDefault();

      const config = getActiveTripConfig();
      const id = document.getElementById('guide-id').value;
      const category = document.getElementById('guide-category').value;
      const city = document.getElementById('guide-city').value;
      const name = document.getElementById('guide-name').value.trim();
      const address = document.getElementById('guide-address').value.trim();
      const desc = document.getElementById('guide-desc').value.trim();
      const image = document.getElementById('guide-image').value.trim();

      const itemData = { category, city, name, address, desc, trip_id: config.id, image: image || null };

      if (category === 'eat') {
        itemData.type = document.getElementById('guide-type').value.trim();
        itemData.is_special = document.getElementById('guide-is-special').checked ? 1 : 0;
        itemData.avoid = null;
      } else {
        itemData.type = null;
        itemData.is_special = 0;
        itemData.avoid = document.getElementById('guide-avoid').value.trim();
      }

      const isEdit = id !== '';
      if (isEdit) {
        itemData.id = Number(id);
      }

      try {
        const method = isEdit ? 'PUT' : 'POST';
        const res = await apiFetch('/api/guides', {
          method,
          headers: { 
            'Content-Type': 'application/json',
            
          },
          body: JSON.stringify(itemData)
        });

        if (!res.ok) throw new Error('API save failed');

        if (!isEdit) {
          const result = await res.json();
          itemData.id = result.id;
        }

        const dataArr = category === 'eat' ? EAT_DATA : PLAY_DATA;
        if (isEdit) {
          const idx = dataArr.findIndex(x => x.id == id);
          if (idx !== -1) dataArr[idx] = itemData;
        } else {
          dataArr.push(itemData);
        }
      } catch (err) {
        console.warn('API error, falling back to LocalStorage:', err.message);
        const dataArr = category === 'eat' ? EAT_DATA : PLAY_DATA;
        if (isEdit) {
          const idx = dataArr.findIndex(x => x.id == id);
          if (idx !== -1) dataArr[idx] = { ...dataArr[idx], ...itemData };
        } else {
          itemData.id = Date.now() + Math.random();
          dataArr.push(itemData);
        }
      }

      localStorage.setItem(`gdx_${category}_data_${config.id}`, JSON.stringify(category === 'eat' ? EAT_DATA : PLAY_DATA));

      if (category === 'eat') {
        renderEatTab();
      } else {
        renderPlayTab();
      }

      closeGuideItemModal();
      showToast(isEdit ? '记录已保存！' : '记录已添加！');
    }

    async function deleteGuideItem(id, category) {
      if (!confirm(`确定要删除这个${category === 'eat' ? '美食' : '景点'}记录吗？`)) return;

      const config = getActiveTripConfig();
      const dataArr = category === 'eat' ? EAT_DATA : PLAY_DATA;
      const idx = dataArr.findIndex(x => x.id == id);
      if (idx === -1) return;

      dataArr.splice(idx, 1);
      localStorage.setItem(`gdx_${category}_data_${config.id}`, JSON.stringify(dataArr));

      try {
        if (typeof id === 'number' && id > 1000000000000) {
          // Local fallback ID
        } else {
          const res = await apiFetch(`/api/guides?id=${id}`, { 
            method: 'DELETE',
            headers: { }
          });
          if (!res.ok) throw new Error('API delete failed');
        }
      } catch (e) {
        console.warn('D1 delete failed:', e.message);
      }

      if (category === 'eat') {
        renderEatTab();
      } else {
        renderPlayTab();
      }
      showToast('记录已删除！');
    }

    async function handleAddHotel(e) {
      e.preventDefault();

      const config = getActiveTripConfig();
      const city = document.getElementById('hotel-city').value;
      const name = document.getElementById('hotel-name').value.trim();
      const checkin = document.getElementById('hotel-checkin').value;
      const checkout = document.getElementById('hotel-checkout').value;
      const address = document.getElementById('hotel-address').value.trim();
      const price = Number(document.getElementById('hotel-price').value);

      const hotelData = { city, name, checkin, checkout, address, price, trip_id: config.id };

      try {
        const res = await apiFetch('/api/hotels', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            
          },
          body: JSON.stringify(hotelData)
        });

        if (!res.ok) throw new Error('API save failed');
        const newHotel = await res.json();
        bookedHotels.push({ id: newHotel.id, ...hotelData });
      } catch (err) {
        console.warn('D1 database error, saving to LocalStorage fallback:', err.message);
        bookedHotels.push({ id: Date.now() + Math.random(), ...hotelData });
      }

      bookedHotels.sort((a, b) => new Date(a.checkin) - new Date(b.checkin));
      localStorage.setItem(`gdx_booked_hotels_${config.id}`, JSON.stringify(bookedHotels));
      renderGlobalHotels();
      renderStayTab();
      e.target.reset();
      closeAddHotelModal();
      showToast('住宿记录已添加！');
    }

      const index = bookedHotels.findIndex(h => h.id == id);
      if (index === -1) return;

      bookedHotels.splice(index, 1);
      localStorage.setItem(`gdx_booked_hotels_${config.id}`, JSON.stringify(bookedHotels));

      try {
        if (typeof id === 'number' && id > 1000000000000) {
          // Local fallback ID
        } else {
          const res = await apiFetch(`/api/hotels?id=${id}`, { 
            method: 'DELETE',
            headers: { }
          });
          if (!res.ok) throw new Error('API delete failed');
        }
      } catch (e) {
        console.warn('D1 delete failed:', e.message);
      }

      renderGlobalHotels();
      renderStayTab();
    }

    // Load segment planner list (Try D1 API, fallback to LocalStorage)
    async function loadSegments() {
      const config = getActiveTripConfig();
      const loader = document.getElementById('timeline-loading');
      if (loader) loader.style.display = 'block';
      timelineList.innerHTML = '';
      try {
        const res = await apiFetch(`/api/segments?trip_id=${config.id}`);
        if (!res.ok) throw new Error('API fetch failed');
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error('Data is not an array');
        segments = data;
      } catch (e) {
        console.warn('D1 Database offline or API error, falling back to LocalStorage.', e.message);
        const local = localStorage.getItem(`gdx_segments_${config.id}`);
        if (local) {
          segments = JSON.parse(local);
        } else {
          segments = DEFAULT_SEGMENTS.filter(x => config.route.some(r => r.name === x.from_st || r.name === x.to_st));
          localStorage.setItem(`gdx_segments_${config.id}`, JSON.stringify(segments));
        }
      } finally {
        if (loader) loader.style.display = 'none';
      }
      renderTimeline();
    }

    // Submit segment handler
    async function handleAddSegment(e) {
      e.preventDefault();

      const config = getActiveTripConfig();
      const from_st = document.getElementById('from-st').value.trim();
      const to_st = document.getElementById('to-st').value.trim();
      const date = document.getElementById('dep-date').value;
      const dep_time = document.getElementById('dep-time').value;
      const train_no = document.getElementById('train-no').value.trim().toUpperCase();
      const price = parseFloat(document.getElementById('price').value) || 0;
      const note = document.getElementById('note').value.trim();

      const newSegment = {
        from_st,
        to_st,
        date,
        dep_time,
        train_no,
        price,
        note,
        trip_id: config.id
      };

      if (editingId !== null || editingIndex !== null) {
        // Edit mode
        if (editingId !== null) {
          newSegment.id = editingId;
          try {
            const res = await apiFetch('/api/segments', {
              method: 'PUT',
              headers: { 
                'Content-Type': 'application/json',
                
              },
              body: JSON.stringify(newSegment)
            });
            if (!res.ok) throw new Error('API update failed');
          } catch (err) {
            console.error(err);
          }
        } else {
          // Local edit
          newSegment.sort_order = segments[editingIndex].sort_order;
          segments[editingIndex] = newSegment;
          localStorage.setItem(`gdx_segments_${config.id}`, JSON.stringify(segments));
        }
        cancelEdit();
      } else {
        // Add mode
        newSegment.sort_order = segments.length + 1;
        try {
          const res = await apiFetch('/api/segments', {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              
            },
            body: JSON.stringify(newSegment)
          });
          if (!res.ok) throw new Error('API post failed');
        } catch (err) {
          console.warn('API post failed, saving to LocalStorage instead.');
          segments.push(newSegment);
          localStorage.setItem(`gdx_segments_${config.id}`, JSON.stringify(segments));
        }
      }

      transportForm.reset();
      await loadSegments();
      // Safe close
      const wrapper = document.getElementById('transport-form-wrapper');
      if (wrapper) wrapper.classList.remove('modal-active');
    }

    // Delete segment
    async function deleteSegment(idOrIndex, isRemote) {
      const config = getActiveTripConfig();
      if (isRemote) {
        try {
          const res = await apiFetch(`/api/segments?id=${idOrIndex}`, { 
            method: 'DELETE',
            headers: { }
          });
          if (!res.ok) throw new Error('API delete failed');
        } catch (e) {
          console.error(e);
        }
      } else {
        segments.splice(idOrIndex, 1);
        localStorage.setItem(`gdx_segments_${config.id}`, JSON.stringify(segments));
      }
      await loadSegments();
    }

    // Start editing segment
    function startEditSegment(idOrIndex, isRemote) {
      let seg;
      if (isRemote) {
        seg = segments.find(s => s.id === idOrIndex);
        editingId = idOrIndex;
        editingIndex = null;
      } else {
        seg = segments[idOrIndex];
        editingIndex = idOrIndex;
        editingId = null;
      }
      
      if (!seg) return;
      
      // Populate form
      document.getElementById('from-st').value = seg.from_st;
      document.getElementById('to-st').value = seg.to_st;
      document.getElementById('dep-date').value = seg.date || '';
      document.getElementById('dep-time').value = seg.dep_time || '';
      document.getElementById('train-no').value = seg.train_no || '';
      document.getElementById('price').value = seg.price || '';
      document.getElementById('note').value = seg.note || '';
      
      // Change form display
      const formCard = document.querySelector('.form-card');
      formCard.querySelector('.form-title').innerHTML = `<i class="fa-solid fa-pencil"></i> 编辑车次`;
      const submitBtn = formCard.querySelector('button[type="submit"]');
      submitBtn.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> 保存修改`;
      
      // Add a cancel button if not already present
      if (!document.getElementById('btn-cancel-edit')) {
        const cancelBtn = document.createElement('button');
        cancelBtn.type = 'button';
        cancelBtn.id = 'btn-cancel-edit';
        cancelBtn.className = 'btn btn-secondary';
        cancelBtn.style.marginTop = '10px';
        cancelBtn.innerHTML = `<i class="fa-solid fa-xmark"></i> 取消编辑`;
        cancelBtn.addEventListener('click', cancelEdit);
        formCard.querySelector('form').appendChild(cancelBtn);
      }
      
      openAddTransportModal();
      
      // Scroll to form on mobile
      formCard.scrollIntoView({ behavior: 'smooth' });
    }

    // Cancel editing
    function cancelEdit() {
      editingId = null;
      editingIndex = null;
      
      const formCard = document.querySelector('.form-card');
      formCard.querySelector('.form-title').innerHTML = `<i class="fa-solid fa-plus-circle"></i> 添加自定义车次`;
      const submitBtn = formCard.querySelector('button[type="submit"]');
      submitBtn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> 添加行程`;
      
      const cancelBtn = document.getElementById('btn-cancel-edit');
      if (cancelBtn) cancelBtn.remove();
      
      document.getElementById('transport-form').reset();
      
      // Close modal directly
      const wrapper = document.getElementById('transport-form-wrapper');
      if (wrapper) wrapper.classList.remove('modal-active');
    }

      const config = getActiveTripConfig();
      try {
        // Clear remote
        for (const seg of segments) {
          if (seg.id) {
            const res = await apiFetch(`/api/segments?id=${seg.id}`, { 
              method: 'DELETE',
              headers: { }
            });

    async function saveTripConfig(e) {
      e.preventDefault();

      const action = document.getElementById('trip-form-action').value;
      const id = document.getElementById('trip-id-input').value.trim().toLowerCase();
      const title = document.getElementById('trip-title-input').value.trim();
      const subtitle = document.getElementById('trip-subtitle-input').value.trim();
      const banner_image = document.getElementById('trip-banner-input').value || 'images/hero_banner.webp';

      // Build route from city rows
      const rows = document.querySelectorAll('#city-list-builder .city-builder-row');
      if (rows.length === 0) {
        alert('请至少添加一个城市！');
        return;
      }

      const routeObj = [...rows].map(row => {
        const name = row.querySelector('.city-name').value.trim();
        if (!name) return null;
        const isTransit = row.querySelector('.city-transit').checked;
        if (isTransit) return { name, isTransitOnly: true };
        const mapWord = row.querySelector('.city-map').value.trim();
        return {
          name,
          isTransitOnly: false,
          image: 'images/hero_banner.webp',
          stayArea: row.querySelector('.city-area').value.trim(),
          stayReason: row.querySelector('.city-reason').value.trim(),
          stayLink: mapWord ? `https://ditu.amap.com/search?query=${encodeURIComponent(mapWord)}` : ''
        };
      }).filter(Boolean);

      const tripData = { id, title, subtitle, banner_image, route_json: JSON.stringify(routeObj) };

      try {
        const method = action === 'add' ? 'POST' : 'PUT';
        const res = await apiFetch('/api/trips', {
          method,
          headers: { 'Content-Type': 'application/json', },
          body: JSON.stringify(tripData)
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || '保存行程配置失败');
        }

        showToast(action === 'add' ? '新建行程成功！' : '编辑行程成功！');
        if (action === 'add') localStorage.setItem('gdx_current_trip_id', id);
        window.location.reload();
      } catch (err) {
        alert('操作失败: ' + err.message);
      }
    }

    async function handleDeleteTrip() {
      const config = getActiveTripConfig();
      if (!confirm(`确定要彻底删除当前行程“${config.title}”吗？此操作将永久清空该行程下的所有住宿、交通和美食攻略，且不可恢复！`)) return;
      
      const confirmInput = prompt(`⚠️ 行程删除非常敏感！请输入该行程的 ID "${config.id}" 以最终确认删除：`);
      if (confirmInput !== config.id) {
        alert('行程 ID 不匹配，取消删除。');
        return;
      }

      try {
        const res = await apiFetch(`/api/trips?id=${config.id}`, {
          method: 'DELETE',
          headers: {
            
          }
        });

        if (!res.ok) throw new Error('API delete failed');

        showToast('行程及级联数据已成功删除！');
        localStorage.removeItem('gdx_current_trip_id');
        window.location.reload();
      } catch (err) {
        alert('删除失败: ' + err.message);
      }
    }
  </script>
</body>
</html>
